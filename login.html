<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CallOps Admin</title>
    <link rel="stylesheet" href="loginstyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<header>
    <div class="theme-toggle" id="themeToggle">
    <i class="fa-solid fa-moon"></i>
    </div>
</header>
<body>
    <body class="dark-mode"></body>
    <main class="container">
        <div class="left-content">
            <h1 class="logo">CallOps</h1>
            <p class="subtitle">Soluções inteligentes para Call Center.</p>
        </div>

        <div class="right-content">
            <form class="login-box">
        <div class="input-group">
            <input type="text" required>
            <label>Email ou Usuário</label>
        </div>

        <div class="input-group">
            <input type="password" required>
            <label>Senha</label>
        </div>

            <button type="submit" class="btn-login">Entrar</button>

            <button type="button" class="btn-forgot">Esqueceu sua senha?</button>

            <hr class="divider">
            </form>
        </div>
    </main>
    <footer class="main-footer">
    <div class="footer-content">
        <div class="footer-left">
            <span class="footer-logo">CallOps Analytics</span>
            <span class="footer-version">© 2026 • v1.0</span>
        </div>

        <div class="footer-right">
            <a href="#">Suporte</a>
            <a href="#">Política de Privacidade</a>
            <a href="#">Termos de Uso</a>
        </div>
    </div>
    </footer>
    <script src="loginscript.js"></script>
</body>
</html>
